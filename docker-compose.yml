services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dental
      POSTGRES_USER: dental
      POSTGRES_PASSWORD: dental
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dental -d dental"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --appendfsync everysec
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # ── LocalStack (S3 + SQS) ───────────────────────────────────────────────────
  localstack:
    image: localstack/localstack:3
    environment:
      SERVICES: s3,sqs
      AWS_DEFAULT_REGION: us-east-1
      LOCALSTACK_HOST: localhost
      # Persist state between restarts
      PERSISTENCE: 1
    ports:
      - "4566:4566"
    volumes:
      - localstack_data:/var/lib/localstack
      - ./infra/localstack/init:/etc/localstack/init/ready.d:ro
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD-SHELL", "awslocal s3 ls || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 15s
    restart: unless-stopped

  # ── Whisper transcription service ────────────────────────────────────────────
  whisper:
    build:
      context: ./apps/whisper
      dockerfile: Dockerfile
    environment:
      WHISPER_MODEL: tiny.en
      WHISPER_DEVICE: cpu
      WHISPER_COMPUTE_TYPE: int8
    ports:
      - "8080:8080"
    volumes:
      - whisper_model_cache:/root/.cache/huggingface
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8080/health', timeout=5)",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  # ── FastAPI ─────────────────────────────────────────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://dental:dental@postgres:5432/dental
      REDIS_URL: redis://redis:6379/0
      AWS_ENDPOINT_URL: http://localstack:4566
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_REGION: us-east-1
      API_ENV: development
      WHISPER_ENDPOINT_URL: http://whisper:8080
    ports:
      - "8000:8000"
    volumes:
      # Mount source for hot reload in dev (uvicorn --reload)
      - ./apps/api/app:/app/app:ro
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      localstack:
        condition: service_healthy
      whisper:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # ── Next.js ──────────────────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      # AUTH_SECRET, AUTH_COGNITO_ID, AUTH_COGNITO_SECRET, AUTH_COGNITO_ISSUER
      # are loaded from .env via env_file above
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  localstack_data:
  whisper_model_cache:
