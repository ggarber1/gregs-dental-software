name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.5.18"
          enable-cache: true

      - run: uv sync --frozen

      - run: uv run ruff check .

      - run: uv run mypy app/

  test-python:
    name: Test Python
    runs-on: ubuntu-latest
    needs: lint-python
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.5.18"
          enable-cache: true

      - run: uv sync --frozen

      - name: Run tests
        run: |
          if [ -d "tests" ]; then
            uv run pytest
          else
            echo "No tests directory — skipping"
          fi

  lint-node:
    name: Lint Node
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: "9.15.4"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      # datamodel-codegen (Python) is required by pnpm generate, which turbo
      # runs as a dependency of type-check
      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.5.18"
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync --frozen
        working-directory: apps/api

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm type-check
