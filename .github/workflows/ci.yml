name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.5.18"
          enable-cache: true

      - run: uv sync --frozen

      - run: uv run ruff check .

      - run: uv run mypy app/

  test-python:
    name: Test Python
    runs-on: ubuntu-latest
    needs: lint-python
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.5.18"
          enable-cache: true

      - run: uv sync --frozen

      - name: Run tests
        run: |
          if [ -d "tests" ]; then
            uv run pytest
          else
            echo "No tests directory — skipping"
          fi

  integration-test-python:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test-python
    defaults:
      run:
        working-directory: apps/api

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dental
          POSTGRES_PASSWORD: dental
          POSTGRES_DB: dental
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dental -d dental"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.5.18"
          enable-cache: true

      - run: uv sync --frozen

      - name: Run integration tests
        run: uv run pytest -m integration
        env:
          DATABASE_URL: postgresql+asyncpg://dental:dental@localhost:5432/dental_test
          APP_ENCRYPTION_KEY: dGVzdGtleXRlc3RrZXl0ZXN0a2V5dGVzdGtleTEyMzQ=
          REDIS_URL: redis://localhost:6379/1
          TWILIO_AUTH_TOKEN: ""

  lint-node:
    name: Lint Node
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      # datamodel-codegen (Python) is required by pnpm generate, which turbo
      # runs as a dependency of type-check
      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.5.18"
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync --frozen
        working-directory: apps/api

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm type-check
