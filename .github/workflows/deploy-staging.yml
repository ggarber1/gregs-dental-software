name: Deploy Staging

on:
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  CLUSTER: dental-staging
  API_SERVICE: dental-staging-api
  WEB_SERVICE: dental-staging-web
  API_TASK_FAMILY: dental-staging-api
  WEB_TASK_FAMILY: dental-staging-web

jobs:
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      web_url: ${{ steps.staging_urls.outputs.web_url }}
      api_url: ${{ steps.staging_urls.outputs.api_url }}
      user_pool_id: ${{ steps.build_config.outputs.user_pool_id }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/dental-staging-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image URIs
        id: images
        run: |
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          REGISTRY="${{ steps.ecr-login.outputs.registry }}"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "api=${REGISTRY}/dental/api:sha-${SHA}" >> "$GITHUB_OUTPUT"
          echo "web=${REGISTRY}/dental/web:sha-${SHA}" >> "$GITHUB_OUTPUT"
          echo "api_latest=${REGISTRY}/dental/api:staging-latest" >> "$GITHUB_OUTPUT"
          echo "web_latest=${REGISTRY}/dental/web:staging-latest" >> "$GITHUB_OUTPUT"

      - name: Read build-time config from SSM
        id: build_config
        run: |
          USER_POOL_ID=$(aws ssm get-parameter \
            --name /dental/staging/cognito/user_pool_id \
            --query Parameter.Value --output text)
          APP_CLIENT_ID=$(aws ssm get-parameter \
            --name /dental/staging/cognito/app_client_id \
            --query Parameter.Value --output text)
          API_URL=$(aws ssm get-parameter \
            --name /dental/staging/app/api_url \
            --query Parameter.Value --output text)
          echo "user_pool_id=${USER_POOL_ID}" >> "$GITHUB_OUTPUT"
          echo "app_client_id=${APP_CLIENT_ID}" >> "$GITHUB_OUTPUT"
          echo "api_url=${API_URL}" >> "$GITHUB_OUTPUT"

      - name: Build and push API image
        run: |
          docker build \
            -t "${{ steps.images.outputs.api }}" \
            -t "${{ steps.images.outputs.api_latest }}" \
            apps/api
          docker push "${{ steps.images.outputs.api }}"
          docker push "${{ steps.images.outputs.api_latest }}"

      - name: Build and push Web image
        run: |
          docker build \
            -f apps/web/Dockerfile \
            --build-arg NEXT_PUBLIC_COGNITO_USER_POOL_ID=${{ steps.build_config.outputs.user_pool_id }} \
            --build-arg NEXT_PUBLIC_COGNITO_CLIENT_ID=${{ steps.build_config.outputs.app_client_id }} \
            --build-arg NEXT_PUBLIC_COGNITO_REGION=us-east-1 \
            --build-arg NEXT_PUBLIC_API_URL=${{ steps.build_config.outputs.api_url }} \
            -t "${{ steps.images.outputs.web }}" \
            -t "${{ steps.images.outputs.web_latest }}" \
            .
          docker push "${{ steps.images.outputs.web }}"
          docker push "${{ steps.images.outputs.web_latest }}"

      - name: Register new API task definition
        id: api-task-def
        run: |
          CURRENT=$(aws ecs describe-task-definition \
            --task-definition "${{ env.API_TASK_FAMILY }}" \
            --query taskDefinition \
            --output json)

          NEW=$(echo "$CURRENT" | jq \
            --arg image "${{ steps.images.outputs.api }}" \
            '(.containerDefinitions[] | select(.name == "api")).image = $image
             | del(.taskDefinitionArn, .revision, .status, .requiresAttributes,
                   .placementConstraints, .compatibilities, .registeredAt, .registeredBy)')

          ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "arn=${ARN}" >> "$GITHUB_OUTPUT"

      - name: Register new Web task definition
        id: web-task-def
        run: |
          CURRENT=$(aws ecs describe-task-definition \
            --task-definition "${{ env.WEB_TASK_FAMILY }}" \
            --query taskDefinition \
            --output json)

          NEW=$(echo "$CURRENT" | jq \
            --arg image "${{ steps.images.outputs.web }}" \
            '(.containerDefinitions[] | select(.name == "web")).image = $image
             | del(.taskDefinitionArn, .revision, .status, .requiresAttributes,
                   .placementConstraints, .compatibilities, .registeredAt, .registeredBy)')

          ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "arn=${ARN}" >> "$GITHUB_OUTPUT"

      - name: Look up network config for migration task
        id: network
        run: |
          SUBNET_ID=$(aws ec2 describe-subnets \
            --filters \
              "Name=tag:Tier,Values=private" \
              "Name=tag:Environment,Values=staging" \
            --query 'Subnets[0].SubnetId' \
            --output text)

          SG_ID=$(aws ec2 describe-security-groups \
            --filters "Name=tag:Name,Values=dental-staging-api-task-sg" \
            --query 'SecurityGroups[0].GroupId' \
            --output text)

          echo "subnet=${SUBNET_ID}" >> "$GITHUB_OUTPUT"
          echo "sg=${SG_ID}" >> "$GITHUB_OUTPUT"

      - name: Run Alembic migrations
        run: |
          TASK_ARN=$(aws ecs run-task \
            --cluster "${{ env.CLUSTER }}" \
            --task-definition "${{ steps.api-task-def.outputs.arn }}" \
            --overrides '{"containerOverrides":[{"name":"api","command":["alembic","upgrade","head"]}]}' \
            --network-configuration "awsvpcConfiguration={subnets=[${{ steps.network.outputs.subnet }}],securityGroups=[${{ steps.network.outputs.sg }}],assignPublicIp=DISABLED}" \
            --launch-type FARGATE \
            --query 'tasks[0].taskArn' \
            --output text)

          echo "Migration task ARN: ${TASK_ARN}"

          aws ecs wait tasks-stopped \
            --cluster "${{ env.CLUSTER }}" \
            --tasks "$TASK_ARN"

          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster "${{ env.CLUSTER }}" \
            --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' \
            --output text)

          if [ "$EXIT_CODE" != "0" ]; then
            echo "Migration failed with exit code ${EXIT_CODE}"
            exit 1
          fi

          echo "Migration succeeded"

      - name: Deploy API service
        run: |
          aws ecs update-service \
            --cluster "${{ env.CLUSTER }}" \
            --service "${{ env.API_SERVICE }}" \
            --task-definition "${{ steps.api-task-def.outputs.arn }}"

      - name: Deploy Web service
        run: |
          aws ecs update-service \
            --cluster "${{ env.CLUSTER }}" \
            --service "${{ env.WEB_SERVICE }}" \
            --task-definition "${{ steps.web-task-def.outputs.arn }}"

      - name: Wait for services to stabilize
        run: |
          # Default waiter: 40 attempts × 15s = 10 min. Bump to 80 × 15s = 20 min
          # to accommodate slow migrations and multi-deployment rollouts.
          AWS_MAX_ATTEMPTS=80 aws ecs wait services-stable \
            --cluster "${{ env.CLUSTER }}" \
            --services "${{ env.API_SERVICE }}" "${{ env.WEB_SERVICE }}"

      - name: Read staging URLs from SSM
        id: staging_urls
        run: |
          WEB_URL=$(aws ssm get-parameter \
            --name /dental/staging/app/web_url \
            --query Parameter.Value --output text)
          API_URL=$(aws ssm get-parameter \
            --name /dental/staging/app/api_url \
            --query Parameter.Value --output text)
          echo "web_url=${WEB_URL}" >> "$GITHUB_OUTPUT"
          echo "api_url=${API_URL}" >> "$GITHUB_OUTPUT"

  e2e:
    name: E2E Tests
    needs: deploy
    uses: ./.github/workflows/e2e.yml
    with:
      web_url: ${{ needs.deploy.outputs.web_url }}
      api_url: ${{ needs.deploy.outputs.api_url }}
      cognito_user_pool_id: ${{ needs.deploy.outputs.user_pool_id }}
    secrets: inherit
